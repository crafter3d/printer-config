#####################################################################
# 	Crafter 3D M6
#####################################################################

[include mainsail.cfg]
[include local/mcus.cfg]

[printer]
kinematics: corexy
max_velocity: 500
max_accel: 12000 #Best 5000
max_z_velocity: 20
max_z_accel: 350
square_corner_velocity: 5.0

# =====================================================================
# Fixed Hardware Constants (wiring, kinematics and electronics)
# =====================================================================

#####################################################################
# 	MCU Configuration
#####################################################################

# UUIDs are unique per physical printer and must be assigned during provisioning.
# Primary flow: Mainsail -> Machine -> Devices -> CAN -> identify and copy UUIDs.
# Secondary flow: run canbus_query.py over SSH.

#[mcu]
#canbus_uuid=

#[mcu toolhead]
#canbus_uuid=

#####################################################################
# 	X/Y Stepper Settings
#####################################################################
## X Stepper - Driver 6 - Rear Right Motor
[stepper_x]
step_pin: PE2
dir_pin: !PE3
enable_pin: !PD4
rotation_distance: 40
microsteps: 32
full_steps_per_rotation: 200
endstop_pin: ^!PG12
position_min: -13
position_endstop: 257.5
position_max: 258.5
homing_speed: 80
second_homing_speed: 20
homing_retract_dist: 5
homing_positive_dir: true

[tmc2209 stepper_x]
uart_pin: PE1
interpolate: false
run_current: 1
hold_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

## Y Stepper - Driver 5 - Left Right Motor
[stepper_y]
step_pin: PC13
dir_pin: PF0
enable_pin: !PF1
rotation_distance: 40
microsteps: 32
full_steps_per_rotation: 200
endstop_pin: ^!PG6
position_min: -7.5
position_endstop: -7.5
position_max: 262.5
homing_speed: 80
second_homing_speed: 20
homing_retract_dist: 5
homing_positive_dir: false

[tmc2209 stepper_y]
uart_pin: PE4
interpolate: false
run_current: 1
hold_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

#####################################################################
# 	Z Stepper Settings
#####################################################################
# Z0 Stepper - Driver 1 - Z Front Right
[stepper_z]
step_pin: PG0
dir_pin: PG1
enable_pin: !PF15
rotation_distance: 4
microsteps: 32
full_steps_per_rotation: 200
endstop_pin: probe:z_virtual_endstop
position_max: 225
position_min: -10
homing_speed: 10
second_homing_speed: 3
homing_retract_dist: 3

[tmc2209 stepper_z]
uart_pin: PD11
interpolate: False
run_current: 1.1
hold_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

# Z1 Stepper - Driver 0 - Z Front Left
[stepper_z1]
step_pin: PF13
dir_pin: PF12
enable_pin: !PF14
rotation_distance: 4
microsteps: 32
full_steps_per_rotation: 200

[tmc2209 stepper_z1]
uart_pin: PC4
interpolate: False
run_current: 1.1
hold_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

# Z2 Stepper - Driver 2 - Z Rear
[stepper_z2]
step_pin: PF11
dir_pin: PG3
enable_pin: !PG5
rotation_distance: 4
microsteps: 32
full_steps_per_rotation: 200

[tmc2209 stepper_z2]
uart_pin: PC6
interpolate: False
run_current: 1.1
hold_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

#####################################################################
# 	Belt Stepper Settings Driver 4
#####################################################################
[manual_stepper belt]
step_pin: PF9
dir_pin: PF10
enable_pin: !PG2
microsteps: 16
rotation_distance: 6.2832
full_steps_per_rotation: 200
velocity: 5
accel: 100

[tmc2209 manual_stepper belt]
uart_pin: PF2
run_current: 0.8
hold_current: 0.2
sense_resistor: 0.110

#####################################################################
# 	Door Stepper Settings - MOTOR 3
#####################################################################
[manual_stepper door]
step_pin: PG4
dir_pin: PC1
enable_pin: !PA0
microsteps: 16
rotation_distance: 100 #this needs to be adjusted
full_steps_per_rotation: 200
velocity: 10
endstop_pin: ^!PG13

[tmc2209 manual_stepper door]
uart_pin: PC7
run_current: 1.2
hold_current: 0.2
sense_resistor: 0.110

#####################################################################
# 	Door Open Sensor (second endstop)
#####################################################################
[gcode_button door_open_sensor]
pin: ^!PG15
press_gcode:
    SET_GCODE_VARIABLE MACRO=OPEN_DOOR VARIABLE=open_triggered VALUE=1
release_gcode:

#####################################################################
# 	Probe
#####################################################################
[bltouch]
sensor_pin: ^toolhead: PB8
control_pin: toolhead: PB9
pin_move_time: 0.680
x_offset: 0.079
y_offset: 22.015
#z_offset: 1.76
speed: 5
lift_speed: 20 #before 10
samples: 2
sample_retract_dist: 5
samples_result: median
samples_tolerance: 0.03
samples_tolerance_retries:5

#####################################################################
# 	Homing and Gantry Adjustment Routines
#####################################################################
[z_tilt]
z_positions:
    #position to spherical bearing joint
   # -89, -41
   # 271, -41
   # 91, 335
   -44.12,-60.21
   315.88,-60.21
   135.88,331.79
points:
    #position toolhead readings for z_tilt
    20, 5
    215, 5
    118, 215

speed: 200
horizontal_move_z: 10
retries: 5
retry_tolerance: 0.015

#####################################################################
# 	BED MESHING
#####################################################################
[bed_mesh]
speed: 200
horizontal_move_z: 5
mesh_min: 18, 22.015
mesh_max: 218, 240
probe_count: 4, 4
mesh_pps: 2, 2
algorithm: bicubic

#####################################################################
# 	Bed Heater
#####################################################################
[heater_bed]
heater_pin: PA1
sensor_type: Generic 3950
inline_resistor: 0
sensor_pin: PF3
max_power: 0.8
min_temp: 0
max_temp: 120
control: pid
pid_Kp: 57.635
pid_Ki: 1.264
pid_Kd: 657.038

[fan_generic bed_cooling_fans]
pin: PD13
max_power: 1.0
shutdown_speed: 0
kick_start_time: 0.5
off_below: 0.20

#####################################################################
# 	Extruder Motor Driver 7
#####################################################################
[extruder]
step_pin: toolhead: PD0
dir_pin: !toolhead: PD1
enable_pin: !toolhead: PD2
gear_ratio: 50:10
microsteps: 16
##	If you ask for 100mm of filament, but in reality it is 98mm:
##	rotation_distance = <previous_rotation_distance> * <actual_extrude_distance> / 100
##  22.6789511 is a good starting point
rotation_distance: 22.6
full_steps_per_rotation: 200
nozzle_diameter: 0.400
filament_diameter: 1.75
max_extrude_only_distance: 600
pressure_advance: 0.03

#####################################
# Hotend Configuration
#####################################
heater_pin: toolhead: PB13
sensor_type: Generic 3950
sensor_pin: toolhead: PA3
min_temp: 0
max_temp: 310
max_power: 0.8
min_extrude_temp: 180
control: pid
pid_kp: 24.059
pid_ki: 2.056
pid_kd: 70.372

[tmc2209 extruder]
uart_pin: toolhead: PA15
interpolate: True
run_current: 0.55
hold_current: 0.25
stealthchop_threshold: 0
sense_resistor: 0.110

#####################################################################
# 	Hotend Fan
#####################################################################
[heater_fan hotend_fan]
pin: toolhead: PA1
max_power: 1.0
fan_speed: 1.0
kick_start_time: 0.5
heater: extruder
heater_temp: 50.0

#####################################################################
# 	Part Cooling Blower
#####################################################################
[fan]
pin: toolhead: PA0
kick_start_time: 0.5
max_power: 1.0
off_below: 0.20

#####################################################################
# 	Filament Sensor
#####################################################################
[filament_switch_sensor filament]
pause_on_runout: True
pause_delay: 0.5
switch_pin: toolhead:PB6
insert_gcode:
    PURGE
runout_gcode:
    M118 FILAMENT RUN OUT
    PAUSE
    PARK_POS

#####################################################################
# 	Accelerometer
#####################################################################
[adxl345]
cs_pin: toolhead: PB12
spi_software_sclk_pin: toolhead: PB10
spi_software_mosi_pin: toolhead: PB11
spi_software_miso_pin: toolhead: PB2
axes_map: x,y,z

[resonance_tester]
accel_chip: adxl345
probe_points:120,130,20

[input_shaper]
#shaper_type_x: mzv
#shaper_freq_x: 55.2
#shaper_type_y: zv
#shaper_freq_y: 43.4
damping_ratio_x: 0.10
damping_ratio_y: 0.10

########################################
# EXP1 / EXP2 (display) pins
########################################
[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PE8, EXP1_2=PE7,
    EXP1_3=PE9, EXP1_4=PE10,
    EXP1_5=PE12, EXP1_6=PE13,    # Slot in the socket on this side
    EXP1_7=PE14, EXP1_8=PE15,
    EXP1_9=<GND>, EXP1_10=<5V>,

    # EXP2 header
    EXP2_1=PA6, EXP2_2=PA5,
    EXP2_3=PB1, EXP2_4=PA4,
    EXP2_5=PB2, EXP2_6=PA7,      # Slot in the socket on this side
    EXP2_7=PC15, EXP2_8=<RST>,
    EXP2_9=<GND>, EXP2_10=<5V>

#####################################################################
# 	Displays
#####################################################################
[display]
##  mini12864 LCD Display
lcd_type: uc1701
cs_pin: EXP1_3
a0_pin: EXP1_4
rst_pin: EXP1_5
encoder_pins: ^EXP2_5, ^EXP2_3
click_pin: ^!EXP1_2
contrast: 63
spi_software_miso_pin: EXP2_1
spi_software_mosi_pin: EXP2_6
spi_software_sclk_pin: EXP2_2

[neopixel btt_mini12864]
##  To control Neopixel RGB in mini12864 display
pin: EXP1_6
chain_count: 3
initial_RED: 0.1
initial_GREEN: 0.5
initial_BLUE: 0.0
color_order: RGB

[output_pin beeper]
pin: EXP1_1
pwm: True
value: 0
shutdown_value: 0
cycle_time: 0.0005
scale: 1000

#####################################################################
# 	Auxiliar blowers
#####################################################################
[fan_generic aux_blower]
pin: PD12
max_power: 1.0
kick_start_time: 0.5
off_below: 0.20

#####################################################################
# 	LED Control
#####################################################################
[output_pin my_led]
pin: PB0
shutdown_value: 1
value: 1

[temperature_sensor RPI]
sensor_type: temperature_host
min_temp: 10
max_temp: 80

[temperature_fan MCU]
pin: PA8
sensor_type: temperature_mcu
target_temp: 50
min_temp: 10
max_temp: 80
min_speed: 0.3
max_speed: 1.0
control: pid
pid_Kp: 40
pid_Ki: 5
pid_Kd: 200

[temperature_sensor toolhead]
sensor_type: temperature_mcu
sensor_mcu: toolhead
min_temp: 10
max_temp: 100

[temperature_fan Chamber]
pin: PE5
sensor_type: Generic 3950
sensor_pin: PF4
target_temp: 50
min_temp: 0
max_temp: 80
min_speed: 0.3
max_speed: 1.0
control: pid
pid_Kp: 40
pid_Ki: 5
pid_Kd: 200

# =====================================================================
# Display Runtime Definitions
# =====================================================================
[include local/generated/network_info_values.cfg]
[include display/display_menu.cfg]
[include display/network_info.cfg]

# =====================================================================
# User-Configurable Runtime Behavior (macros)
# =====================================================================
[include local/client_variables.cfg]
# Macros
[include macros/system_helpers.cfg]
[include macros/homing.cfg]
[include macros/cleaning_purge.cfg]
[include macros/printing_commands.cfg]
[include macros/filament_handling.cfg]
[include macros/temperature_presets.cfg]
[include macros/system_control.cfg]
[include macros/calibration.cfg]
[include macros/filament_change.cfg]
[include macros/park_position.cfg]
[include macros/demo_macro.cfg]
[include macros/extruder_test.cfg]
[include macros/object_ejection.cfg]

# =====================================================================
# User-Persisted Variables
# =====================================================================
[save_variables]
filename: ~/printer_data/config/variables.cfg

[exclude_object]

[force_move]
enable_force_move: True

[skew_correction]

[idle_timeout]
timeout: 600
gcode:
    {% if printer.pause_resume.is_paused %}
        TURN_OFF_HEATERS
        RESPOND MSG="Idle timeout while paused: heaters off, steppers preserved"
    {% else %}
        TURN_OFF_HEATERS
        M84
    {% endif %}

# =====================================================================
# Calibration Values (auto-managed by SAVE_CONFIG)
# =====================================================================
# SAVE_CONFIG lives in the local printer.cfg entrypoint generated on install.
