
#####################################################################
# 	X/Y Stepper Settings
#####################################################################
## X Stepper - Driver 6 - Rear Right Motor
[stepper_x]
step_pin: PE2
dir_pin: !PE3
enable_pin: !PD4
rotation_distance: 40
microsteps: 32
full_steps_per_rotation: 200
endstop_pin: ^!PG12
position_min: -13
position_endstop: 257.5
position_max: 258.5
homing_speed: 80
second_homing_speed: 20
homing_retract_dist: 5
homing_positive_dir: true

[tmc2209 stepper_x]
uart_pin: PE1
interpolate: false
run_current: 1
hold_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

## Y Stepper - Driver 5 - Left Right Motor
[stepper_y]
step_pin: PC13
dir_pin: PF0
enable_pin: !PF1
rotation_distance: 40
microsteps: 32
full_steps_per_rotation: 200
endstop_pin: ^!PG6
position_min: -7.5
position_endstop: -7.5
position_max: 262.5
homing_speed: 80
second_homing_speed: 20
homing_retract_dist: 5
homing_positive_dir: false

[tmc2209 stepper_y]
uart_pin: PE4
interpolate: false
run_current: 1
hold_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0
