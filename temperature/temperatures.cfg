[temperature_sensor RPI]
sensor_type: temperature_host
min_temp: 10
max_temp: 80

[temperature_fan MCU]
pin: PA8
sensor_type: temperature_mcu
target_temp: 50
min_temp: 10
max_temp: 80
min_speed: 0.3
max_speed: 1.0
control: pid
pid_Kp: 40
pid_Ki: 5
pid_Kd: 200

[temperature_sensor toolhead]
sensor_type: temperature_mcu
sensor_mcu: toolhead
min_temp: 10
max_temp: 100

[temperature_fan Chamber]
pin: PE5
sensor_type: Generic 3950
sensor_pin: PF4
target_temp: 50
min_temp: 0
max_temp: 80
min_speed: 0.3
max_speed: 1.0
control: pid
pid_Kp: 40
pid_Ki: 5
pid_Kd: 200
