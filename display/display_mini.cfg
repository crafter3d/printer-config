########################################
# EXP1 / EXP2 (display) pins
########################################
[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PE8, EXP1_2=PE7,
    EXP1_3=PE9, EXP1_4=PE10,
    EXP1_5=PE12, EXP1_6=PE13,    # Slot in the socket on this side
    EXP1_7=PE14, EXP1_8=PE15,
    EXP1_9=<GND>, EXP1_10=<5V>,

    # EXP2 header
    EXP2_1=PA6, EXP2_2=PA5,
    EXP2_3=PB1, EXP2_4=PA4,
    EXP2_5=PB2, EXP2_6=PA7,      # Slot in the socket on this side
    EXP2_7=PC15, EXP2_8=<RST>,
    EXP2_9=<GND>, EXP2_10=<5V>

#####################################################################
# 	Displays
#####################################################################
[display]
##  mini12864 LCD Display
lcd_type: uc1701
cs_pin: EXP1_3
a0_pin: EXP1_4
rst_pin: EXP1_5
encoder_pins: ^EXP2_5, ^EXP2_3
click_pin: ^!EXP1_2
contrast: 63
spi_software_miso_pin: EXP2_1
spi_software_mosi_pin: EXP2_6
spi_software_sclk_pin: EXP2_2

[neopixel btt_mini12864]
##  To control Neopixel RGB in mini12864 display
pin: EXP1_6
chain_count: 3
initial_RED: 0.1
initial_GREEN: 0.5
initial_BLUE: 0.0
color_order: RGB

##  Set RGB values on boot up for each Neopixel.
##  Index 1 = display, Index 2 and 3 = Knob
[delayed_gcode setdisplayneopixel]
initial_duration: 1
gcode:
    SET_LED LED=btt_mini12864 RED=1 GREEN=1 BLUE=1 INDEX=1 TRANSMIT=0
    SET_LED LED=btt_mini12864 RED=1 GREEN=0 BLUE=0 INDEX=2 TRANSMIT=0
    SET_LED LED=btt_mini12864 RED=0 GREEN=0 BLUE=0 INDEX=3

#--------------------------------------------------------------------

[output_pin beeper]
pin: EXP1_1
pwm: True
value: 0
shutdown_value: 0
cycle_time: 0.0005
scale: 1000

[gcode_macro M300]
gcode:
    {% set S = params.S|default(950)|int %}
    {% set P = params.P|default(100)|int %}
    {% if S > 950 %}
        {% set S = 950 %}
    {% endif %}
    SET_PIN PIN=beeper VALUE={S}
    G4 P{P}
    SET_PIN PIN=beeper VALUE=0


[gcode_macro CHIME_CLICK]
gcode:
    M300 S600 P15

[gcode_macro CHIME_OK]
description: Confirmation chime
gcode:
    M300 S784 P70   ; G5
    G4 P30
    M300 S988 P120  ; B5

[gcode_macro CHIME_CANCEL]
description: Cancel / stop chime
gcode:
    M300 S988 P120  ; B5
    G4 P30
    M300 S784 P70   ; G5


[gcode_macro CHIME_PRINT_COMPLETE]
description: Print complete fanfare
gcode:
    # Small fanfare + final "sparkle"
    M300 S659 P90    ; E5
    G4 P20
    M300 S784 P90    ; G5
    G4 P20
    M300 S988 P140   ; B5 (max-ish)
    G4 P40

    M300 S784 P80    ; G5
    G4 P20
    M300 S988 P120   ; B5
    G4 P20
    M300 S880 P160   ; A5
    G4 P40

    M300 S988 P120   ; B5
    G4 P30
    M300 S784 P220   ; G5 (resolve)


# startup_chime fires at boot (display_mini.cfg) — calls CHIME_PRINT_COMPLETE
# Renamed from startup_led_flash to avoid conflict with led.cfg's [delayed_gcode startup_led_flash]
[delayed_gcode startup_chime]
initial_duration: 1
gcode:
    CHIME_PRINT_COMPLETE
