[gcode_macro EXTRUDER_STRESS_COMBINED]
description: Extruder-only combined stress: long fill + fast bursts + retract/microretract/prime (no XY/Z, no temp)
# Examples:
#   EXTRUDER_STRESS_COMBINED FILL=20 FFILL=550 BURSTS=4 FBURST=2000 REPS=15 FRET=1800
#
# Params:
#   FILL   = long sustained extrusion amount (mm)          default 120
#   FFILL  = feedrate for long fill (mm/min)              default 2400  (40 mm/s)
#   BURSTS = number of fast extrusion bursts              default 0
#   BURST  = burst amount per pulse (mm)                  default 2
#   FBURST = feedrate for bursts (mm/min)                 default 7200  (120 mm/s)
#   REPS   = number of retract/prime cycles               default 50
#   RET    = main retract amount (mm)                     default 0.18645
#   WIPE   = micro-retract amount (mm)                    default 0.05226
#   WIPES  = number of micro-retracts per cycle           default 6
#   PRIME  = prime amount after retracts (mm)             default 0.50
#   FRET   = feedrate for retract/prime (mm/min)          default 1800  (30 mm/s)
gcode:
    {% set fill   = params.FILL|default(20.0)|float %}
    {% set ffill  = params.FFILL|default(550)|int %}
    {% set bursts = params.BURSTS|default(4)|int %}
    {% set burst  = params.BURST|default(2)|float %}
    {% set fburst = params.FBURST|default(2000)|int %}

    {% set reps  = params.REPS|default(15)|int %}
    {% set ret   = params.RET|default(0.18645)|float %}
    {% set wipe  = params.WIPE|default(0.05226)|float %}
    {% set wipes = params.WIPES|default(3)|int %}
    {% set prime = params.PRIME|default(0.50)|float %}
    {% set fret  = params.FRET|default(1800)|int %}

    {% if printer.extruder.can_extrude|lower != 'true' %}
      {action_raise_error("Extruder not hot enough to extrude. Heat hotend or remove filament (note: behavior differs unloaded).")}
    {% endif %}

    SAVE_GCODE_STATE NAME=EX_STRESS
    M83                      ; relative extrusion

    ; --- 1) Long sustained extrusion ("fill") ---
    ; Stresses melt/drive consistency and continuous step rate
    G1 E{fill} F{ffill}

    ; --- 2) Optional fast burst pulses (high step rate) ---
    ; Stresses max E speed and driver stability; disable by BURSTS=0
    {% for i in range(bursts) %}
      G1 E-{ret} F{fburst}
      G1 E{burst} F{fburst}
      G1 E-{ret} F{fburst}
      G1 E{fill} F{ffill}
    {% endfor %}

    ; --- 3) Retract / micro-retract / hard prime loop (worst reversals) ---
    {% for i in range(reps) %}
      G1 E{prime} F{fret}
      G1 E-{ret} F{fret}
      {% for j in range(wipes) %}
        G1 E-{wipe} F{fret}
      {% endfor %}
    {% endfor %}

    RESTORE_GCODE_STATE NAME=EX_STRESS
