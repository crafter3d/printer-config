#####################################################################
#  Mechanical ejection macros
#####################################################################

[gcode_macro Z_DROP]
description: Lower bed to max Z and 5mm beyond for belt throw clearance
gcode:
    RESPOND MSG="Lowering the bed"
    {% set z_max = printer.toolhead.axis_maximum.z|float %}
    {% set BED_POS = params.DROP_POS|default((z_max - 5)|int)|int %}
    HOME_CHECK
    {% set travel_speed = 15 %}
    SAVE_GCODE_STATE NAME=z_drop_restore
    # Move in absolute mode to reach a known ejection clearance height.
    G90
    G1 Z{BED_POS - 10} F{travel_speed * 60}
    G1 Z{BED_POS} F600
    SAVE_VARIABLE VARIABLE=z_drop VALUE=1
    RESTORE_GCODE_STATE NAME=z_drop_restore

[gcode_macro BELT_THROW]
description: Full motion to throw object from belt.
gcode:
    {% set BED_MOVE = 500 %}

    RESPOND MSG="Belt moving"
    MANUAL_STEPPER STEPPER=belt ENABLE=1
    MANUAL_STEPPER STEPPER=belt MOVE={BED_MOVE} SPEED=30
    MANUAL_STEPPER STEPPER=belt SET_POSITION=0
    MANUAL_STEPPER STEPPER=belt MOVE=-500 SPEED=30
    MANUAL_STEPPER STEPPER=belt SET_POSITION=0

    EJECT_LEVER_THROW
    RESPOND MSG="Belt throw completed"

[gcode_macro BELT_MOVE]
description: Move belt by distance. Supports signed DIST or DIR override.
gcode:
    # Examples:
    #   BELT_MOVE DIST=50 SPEED=30
    #   BELT_MOVE DIST=-25 SPEED=20
    #   BELT_MOVE DIST=25 DIR=-1 SPEED=20
    {% set raw_distance = params.DIST|default(0)|float %}
    {% set speed = params.SPEED|default(30)|float %}
    {% set dir = params.DIR|default(0)|int %}
    {% if speed <= 0 %}
      RESPOND TYPE=error MSG="BELT_MOVE SPEED must be > 0"
    {% else %}
      {% set move = raw_distance %}
      {% if dir != 0 %}
        {% set move = raw_distance|abs * (1 if dir > 0 else -1) %}
      {% endif %}
      {% if move == 0 %}
        RESPOND TYPE=error MSG="BELT_MOVE requires non-zero DIST"
      {% else %}
        RESPOND MSG="Belt move {move}mm at {speed}mm/s"
        MANUAL_STEPPER STEPPER=belt ENABLE=1
        MANUAL_STEPPER STEPPER=belt MOVE={move} SPEED={speed}
        MANUAL_STEPPER STEPPER=belt SET_POSITION=0
      {% endif %}
    {% endif %}

[gcode_macro BELT_ON]
description: Continuous belt motion. DIR=1 forward, DIR=-1 reverse.
variable_running: 0
variable_dir: 1
variable_speed: 30
variable_step: 2
gcode:
    # Examples:
    #   BELT_ON DIR=1 SPEED=30 STEP=2
    #   BELT_ON DIR=-1 SPEED=20 STEP=1
    {% set dir = params.DIR|default(1)|int %}
    {% set speed = params.SPEED|default(30)|float %}
    {% set step = params.STEP|default(2)|float %}
    {% if dir == 0 %}
      RESPOND TYPE=error MSG="BELT_ON DIR must be 1 or -1"
    {% elif speed <= 0 %}
      RESPOND TYPE=error MSG="BELT_ON SPEED must be > 0"
    {% elif step == 0 %}
      RESPOND TYPE=error MSG="BELT_ON STEP must be non-zero"
    {% else %}
      SET_GCODE_VARIABLE MACRO=BELT_ON VARIABLE=running VALUE=1
      SET_GCODE_VARIABLE MACRO=BELT_ON VARIABLE=dir VALUE={1 if dir > 0 else -1}
      SET_GCODE_VARIABLE MACRO=BELT_ON VARIABLE=speed VALUE={speed}
      SET_GCODE_VARIABLE MACRO=BELT_ON VARIABLE=step VALUE={step|abs}
      RESPOND MSG="Belt ON dir={1 if dir > 0 else -1} speed={speed} step={step|abs}"
      UPDATE_DELAYED_GCODE ID=BELT_ON_LOOP DURATION=0.01
    {% endif %}

[delayed_gcode BELT_ON_LOOP]
gcode:
    {% set belt = printer["gcode_macro BELT_ON"] %}
    {% if belt.running|int == 1 %}
      MANUAL_STEPPER STEPPER=belt MOVE={belt.step|float * belt.dir|int} SPEED={belt.speed|float}
      MANUAL_STEPPER STEPPER=belt SET_POSITION=0
      UPDATE_DELAYED_GCODE ID=BELT_ON_LOOP DURATION=0.01
    {% endif %}

[gcode_macro BELT_OFF]
description: Stop continuous belt motion.
gcode:
    # Examples:
    #   BELT_OFF
    #   BELT_ON DIR=1 SPEED=25 STEP=2 ; then BELT_OFF
    {% set was_running = printer["gcode_macro BELT_ON"].running|int %}
    {% if was_running == 1 %}
      SET_GCODE_VARIABLE MACRO=BELT_ON VARIABLE=running VALUE=0
      UPDATE_DELAYED_GCODE ID=BELT_ON_LOOP DURATION=0
      MANUAL_STEPPER STEPPER=belt ENABLE=0
      RESPOND MSG="Belt OFF"
    {% else %}
      UPDATE_DELAYED_GCODE ID=BELT_ON_LOOP DURATION=0
      MANUAL_STEPPER STEPPER=belt ENABLE=0
      RESPOND MSG="Belt already OFF"
    {% endif %}

[gcode_macro OPEN_DOOR]
description: Open door using opposite signal on shared endstop input.
gcode:
    MANUAL_STEPPER STEPPER=door SET_POSITION=0
    MANUAL_STEPPER STEPPER=door MOVE=2
    MANUAL_STEPPER STEPPER=door MOVE=50 STOP_ON_ENDSTOP=2
    RESPOND MSG="Door opened"

[gcode_macro CLOSE_DOOR]
description: close door.
gcode:
    MANUAL_STEPPER STEPPER=door SET_POSITION=50
    MANUAL_STEPPER STEPPER=door MOVE=48 STOP_ON_ENDSTOP=2
    MANUAL_STEPPER STEPPER=door MOVE=0 STOP_ON_ENDSTOP=2
    RESPOND MSG="Door closed"

[gcode_macro EJECT_LEVER_SET]
description: Set ejection lever servo angle.
gcode:
    {% set angle = params.ANGLE|default(20)|float %}
    {% if angle < 0 or angle > 80 %}
      RESPOND TYPE=error MSG="EJECT_LEVER_SET ANGLE must be between 0 and 180"
    {% else %}
      SET_SERVO SERVO=eject_lever ANGLE={angle}
      RESPOND MSG="Ejection lever angle set to {angle}"
    {% endif %}

[gcode_macro EJECT_LEVER_THROW]
description: Throw object with ejection lever then return to rest.
gcode:
    # Examples:
    #   EJECT_LEVER_THROW
    #   EJECT_LEVER_THROW THROW=0 REST=75 DWELL=350
    {% set throw_angle = params.THROW|default(0)|float %}
    {% set rest_angle = params.REST|default(75)|float %}
    {% set dwell = params.DWELL|default(350)|int %}

    EJECT_LEVER_SET ANGLE={throw_angle}
    G4 P{dwell}
    EJECT_LEVER_SET ANGLE={rest_angle}

[gcode_macro EJECT_LEVER_REST]
description: Move ejection lever to rest position.
gcode:
    {% set rest_angle = params.ANGLE|default(75)|float %}
    EJECT_LEVER_SET ANGLE={rest_angle}
