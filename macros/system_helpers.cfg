#####################################################################
#  System and UI helper macros
#####################################################################

[delayed_gcode _SYNC_CLIENT_PARK_X]
initial_duration: 1
gcode:
    {% set x_park = printer.toolhead.axis_maximum.x|float - 1.0 %}
    # Keep park X synchronized if axis maximum changes.
    SET_GCODE_VARIABLE MACRO=_CLIENT_VARIABLE VARIABLE=custom_park_x VALUE={x_park}

[gcode_macro _MMU_SAFE_PARK_MOVE]
description: MMU park helper that clamps automated XY moves to safe range.
gcode:
        {% set restore = params.RESTORE|default(0)|int %}
        {% set x_req = params.X|default(-999)|float %}
        {% set y_req = params.Y|default(-999)|float %}
        {% set feed = params.F|default(12000)|float %}
        {% set move_x = x_req != -999 %}
        {% set move_y = y_req != -999 %}
        {% set x_max_safe = printer.toolhead.axis_maximum.x|float - 1.0 %}
        {% set y_max_safe = printer.toolhead.axis_maximum.y|float - 5.0 %}

        {% if move_x %}
            {% set x_target = [0.0, [x_req, x_max_safe]|min]|max %}
            {% if x_target != x_req %}
                RESPOND TYPE=echo MSG="MMU park clamp applied: X {x_req} -> {x_target}"
            {% endif %}
        {% endif %}

        {% if move_y %}
            {% set y_target = [0.0, [y_req, y_max_safe]|min]|max %}
            {% if y_target != y_req %}
                RESPOND TYPE=echo MSG="MMU park clamp applied: Y {y_req} -> {y_target}"
            {% endif %}
        {% endif %}

        {% if move_x and move_y %}
            G1 X{x_target} Y{y_target} F{feed}
        {% elif move_x %}
            G1 X{x_target} F{feed}
        {% elif move_y %}
            G1 Y{y_target} F{feed}
        {% else %}
            {% if restore == 1 %}
                RESPOND TYPE=echo MSG="MMU park restore skipped: no XY move requested"
            {% else %}
                RESPOND TYPE=echo MSG="MMU park skipped: no XY move requested"
            {% endif %}
        {% endif %}

[gcode_macro M106]
description: Layer blower (P1) or Aux blower (P2) ON.
rename_existing: M106.1
gcode:
    {% set speed = params.S|default(255)|float %}
    {% set fan = params.P|default(0)|int %}
    {% if fan == 2 %}
      # Route M106 P2 to the auxiliary blower channel.
      SET_FAN_SPEED FAN=aux_blower SPEED={speed / 255.0}
    {% else %}
      M106.1 {rawparams}
    {% endif %}

[gcode_macro M107]
description: Layer blower (P1) or Aux blower (P2) OFF.
rename_existing: M107.1
gcode:
    {% set fan = params.P|default(0)|int %}
    {% if fan == 2 %}
      SET_FAN_SPEED FAN=aux_blower SPEED=0
    {% else %}
      M107.1
    {% endif %}

[delayed_gcode setdisplayneopixel]
initial_duration: 1
gcode:
    # Boot LEDs: white display, red knob indicator, third LED off.
    SET_LED LED=btt_mini12864 RED=1 GREEN=1 BLUE=1 INDEX=1 TRANSMIT=0
    SET_LED LED=btt_mini12864 RED=1 GREEN=0 BLUE=0 INDEX=2 TRANSMIT=0
    SET_LED LED=btt_mini12864 RED=0 GREEN=0 BLUE=0 INDEX=3

[gcode_macro M300]
gcode:
    {% set S = params.S|default(950)|int %}
    {% set P = params.P|default(100)|int %}
    {% if S > 950 %}
        {% set S = 950 %}
    {% endif %}
    # Drive beeper pin as PWM frequency for a fixed duration.
    SET_PIN PIN=beeper VALUE={S}
    G4 P{P}
    SET_PIN PIN=beeper VALUE=0

[gcode_macro CHIME_CLICK]
gcode:
    M300 S600 P15

[gcode_macro CHIME_OK]
description: Confirmation chime
gcode:
    M300 S784 P70   ; G5
    G4 P30
    M300 S988 P120  ; B5

[gcode_macro CHIME_CANCEL]
description: Cancel / stop chime
gcode:
    M300 S988 P120  ; B5
    G4 P30
    M300 S784 P70   ; G5

[gcode_macro CHIME_PRINT_COMPLETE]
description: Print complete fanfare
gcode:
    # Small fanfare + final "sparkle"
    M300 S659 P90    ; E5
    G4 P20
    M300 S784 P90    ; G5
    G4 P20
    M300 S988 P140   ; B5 (max-ish)
    G4 P40

    M300 S784 P80    ; G5
    G4 P20
    M300 S988 P120   ; B5
    G4 P20
    M300 S880 P160   ; A5
    G4 P40

    M300 S988 P120   ; B5
    G4 P30
    M300 S784 P220   ; G5 (resolve)

[delayed_gcode startup_chime]
initial_duration: 1
gcode:
    CHIME_PRINT_COMPLETE

[gcode_macro TOGGLE_LED]
description: Toggle LED status and persist preference.
gcode:
    {% set current = printer.save_variables.variables.led_status|default(1)|int %}
    {% if current > 0 %}
        SET_PIN PIN=my_led VALUE=0
        SAVE_VARIABLE VARIABLE=led_status VALUE=0
        RESPOND MSG="LED OFF (saved)"
    {% else %}
        SET_PIN PIN=my_led VALUE=1
        SAVE_VARIABLE VARIABLE=led_status VALUE=1
        RESPOND MSG="LED ON (saved)"
    {% endif %}

[gcode_macro FLASH_LED]
description: Flash LED 3 times when LED preference is enabled.
gcode:
    {% if printer.save_variables.variables.led_status|default(1)|int == 1 %}
        {% for i in range(3) %}
            SET_PIN PIN=my_led VALUE=0
            G4 P200
            SET_PIN PIN=my_led VALUE=1
            G4 P200
        {% endfor %}
    {% endif %}

[delayed_gcode startup_led_flash]
initial_duration: 2
gcode:
    {% set led_on = printer.save_variables.variables.led_status|default(1)|int %}
    SET_PIN PIN=my_led VALUE={1 if led_on else 0}
    {% if led_on %}
        FLASH_LED
    {% endif %}

[delayed_gcode startup_eject_lever_rest]
initial_duration: 3
gcode:
    EJECT_LEVER_REST
    RESPOND MSG="Ejection lever initialized to rest position"

[gcode_macro LED_ON]
description: Turn LED ON and persist preference.
gcode:
    SET_PIN PIN=my_led VALUE=1
    SAVE_VARIABLE VARIABLE=led_status VALUE=1
    RESPOND MSG="LED ON (saved)"

[gcode_macro LED_OFF]
description: Turn LED OFF and persist preference.
gcode:
    SET_PIN PIN=my_led VALUE=0
    SAVE_VARIABLE VARIABLE=led_status VALUE=0
    RESPOND MSG="LED OFF (saved)"

[gcode_macro DOOR_REQUIRED]
description: Require door close before PRINT_START.
gcode:
    SAVE_VARIABLE VARIABLE=force_closed_door_before_print VALUE=1
    RESPOND MSG="Door close required before print (saved)"

[gcode_macro DOOR_OPTIONAL]
description: Skip door close before PRINT_START.
gcode:
    SAVE_VARIABLE VARIABLE=force_closed_door_before_print VALUE=0
    RESPOND MSG="Door close optional before print (saved)"
