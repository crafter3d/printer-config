#####################################################################
#  Calibration macros
#####################################################################
[gcode_macro PID_CALIBRATE_BED]
description: Auto-tune bed heater PID.
gcode:
    {% set temp = params.TARGET|default(60)|int %}
    RESPOND MSG="PID bed calibration at {temp}C"
    PID_CALIBRATE HEATER=heater_bed TARGET={temp}
    RESPOND MSG="Bed PID complete. Run SAVE_CONFIG to persist."

[gcode_macro PID_CALIBRATE_HOTEND]
description: Auto-tune hotend PID.
gcode:
    {% set temp = params.TARGET|default(210)|int %}
    RESPOND MSG="PID hotend calibration at {temp}C"
    PID_CALIBRATE HEATER=extruder TARGET={temp}
    RESPOND MSG="Hotend PID complete. Run SAVE_CONFIG to persist."

[gcode_macro BED_MESH_LOAD]
description: Load saved bed mesh profile.
gcode:
    BED_MESH_PROFILE LOAD=default
    RESPOND MSG="Bed mesh loaded"

[gcode_macro Z_TILT_ADJUST]
rename_existing: _BASE_Z_TILT_ADJUST
description: Ensure homing before running Z tilt adjustment.
gcode:
    HOME_CHECK
    {% if rawparams %}
        _BASE_Z_TILT_ADJUST {rawparams}
    {% else %}
        _BASE_Z_TILT_ADJUST
    {% endif %}

[gcode_macro BED_MESH_CALIBRATE]
rename_existing: _BASE_BED_MESH_CALIBRATE
description: Ensure homing before running bed mesh calibration.
gcode:
    HOME_CHECK
    {% if rawparams %}
        _BASE_BED_MESH_CALIBRATE {rawparams}
    {% else %}
        _BASE_BED_MESH_CALIBRATE
    {% endif %}

[gcode_macro CALIBRATE]
description: Full calibration flow with skip flags.
gcode:
    {% set skip_ztilt = params.SKIP_ZTILT|default(0)|int %}
    {% set skip_zoffset = params.SKIP_ZOFFSET|default(0)|int %}
    {% set skip_mesh = params.SKIP_MESH|default(0)|int %}
    {% set skip_shaper = params.SKIP_SHAPER|default(0)|int %}
    {% set skip_pid_bed = params.SKIP_PID_BED|default(0)|int %}
    {% set skip_pid_hotend = params.SKIP_PID_HOTEND|default(0)|int %}
    {% set bed_temp = params.BED_TEMP|default(60)|int %}
    {% set hotend_temp = params.HOTEND_TEMP|default(210)|int %}

    {% if printer.print_stats.state|lower == "printing" %}
        {action_raise_error("Cannot run CALIBRATE during active print")}
    {% endif %}

    RESPOND MSG="CALIBRATE: starting sequence"
    G28

    {% if skip_ztilt == 0 %}
        RESPOND MSG="CALIBRATE: Z_TILT pass 1"
        Z_TILT_ADJUST
    {% endif %}

    {% if skip_zoffset == 0 %}
        RESPOND MSG="CALIBRATE: PROBE_CALIBRATE interactive step"
        M140 S{bed_temp}
        M104 S200
        M190 S{bed_temp}
        M109 S200
        G28 Z
        PROBE_CALIBRATE
    {% endif %}

    M104 S0
    G28

    {% if skip_ztilt == 0 %}
        M190 S{bed_temp}
        RESPOND MSG="CALIBRATE: Z_TILT pass 2"
        Z_TILT_ADJUST
    {% endif %}

    {% if skip_mesh == 0 %}
        M190 S{bed_temp}
        G28 Z
        RESPOND MSG="CALIBRATE: BED_MESH_CALIBRATE"
        BED_MESH_CALIBRATE
    {% endif %}

    {% if skip_shaper == 0 %}
        RESPOND MSG="CALIBRATE: SHAPER_CALIBRATE"
        M140 S0
        M104 S0
        G4 P60000
        G28
        {% set x_center = (printer.toolhead.axis_minimum.x|float + printer.toolhead.axis_maximum.x|float) / 2.0 %}
        {% set y_center = (printer.toolhead.axis_minimum.y|float + printer.toolhead.axis_maximum.y|float) / 2.0 %}
        G0 X{x_center} Y{y_center} Z20 F3000
        SHAPER_CALIBRATE AXIS=X
        SHAPER_CALIBRATE AXIS=Y
    {% endif %}

    {% if skip_pid_bed == 0 %}
        M140 S0
        M104 S0
        G4 P10000
        PID_CALIBRATE_BED TARGET={bed_temp}
    {% endif %}

    {% if skip_pid_hotend == 0 %}
        M140 S0
        M104 S0
        G4 P5000
        PID_CALIBRATE_HOTEND TARGET={hotend_temp}
    {% endif %}

    M140 S0
    M104 S0
    PARK_POS
    RESPOND MSG="CALIBRATE complete. Saving config and restarting."
    SAVE_CONFIG
