#####################################################################
#  Filament handling
#####################################################################
[gcode_macro LOAD_FILAMENT]
description: Load filament into the active extruder.
gcode:
    {% set speed = params.SPEED|default(10)|float %}
    {% set distance = params.DISTANCE|default(80)|float %}
    {% set min_temp = printer.configfile.settings.extruder.min_extrude_temp|float %}
    {% set paused_temp = printer['gcode_macro RESUME'].last_extruder_temp.temp|default(0)|float %}
    {% set paused_restore = printer['gcode_macro RESUME'].last_extruder_temp.restore|default(False) %}
    {% set previous_temp = printer['gcode_macro PRINT_START'].last_extruder_temp|default(0)|float %}
    {% set selected_temp = 200.0 %}
    {% set selected_source = 'fallback' %}
    {% if printer.pause_resume.is_paused and paused_restore and paused_temp > 0 %}
        {% set selected_temp = paused_temp %}
        {% set selected_source = 'paused print' %}
    {% elif previous_temp > 0 %}
        {% set selected_temp = previous_temp %}
        {% set selected_source = 'previous print' %}
    {% endif %}
    {% set target_temp = [selected_temp, min_temp]|max %}
    SAVE_GCODE_STATE NAME=load_filament_state
    {% if not printer[printer.toolhead.extruder].can_extrude %}
        RESPOND MSG="Heating extruder to {target_temp}C for filament load (source: {selected_source})"
        M109 S{target_temp}
    {% endif %}
    M83
    G1 E{distance} F{speed * 60}
    G92 E0
    RESTORE_GCODE_STATE NAME=load_filament_state
    RESPOND MSG="Filament loaded. Running post-load cleanup and purge workflow"
    _LOAD_FILAMENT_POST_WORKFLOW

[gcode_macro CLEAN_AND_PURGE]
description: Clean nozzle and purge filament, typically used as a pre-print start sequence or for tool changes.
gcode:
    {% set distance = params.DIST|default(80)|float %}
    PARK_POS
    CLEAN_NOZZLE
    PURGE DIST={distance}
    CLEAN_NOZZLE

[gcode_macro _LOAD_FILAMENT_POST_WORKFLOW]
description: Post-load sequence to park, clean, purge, and confirm extrusion.
gcode:
    CLEAN_AND_PURGE
    _LOAD_FILAMENT_CONFIRM_PROMPT

[gcode_macro _LOAD_FILAMENT_CONFIRM_PROMPT]
description: Ask operator to choose next action after filament load workflow.
gcode:
    RESPOND TYPE=command MSG="action:prompt_begin Filament load confirmation"
    RESPOND TYPE=command MSG="action:prompt_text Did filament extrude correctly?"
    RESPOND TYPE=command MSG="action:prompt_text 1) Loaded correctly: resume now"
    RESPOND TYPE=command MSG="action:prompt_text 2) Purge and ask again"
    RESPOND TYPE=command MSG="action:prompt_text 3) Not loaded: recover manually"
    RESPOND TYPE=command MSG="action:prompt_footer_button Loaded OK - Resume|_LOAD_FILAMENT_OPTION_RESUME|primary"
    RESPOND TYPE=command MSG="action:prompt_footer_button Purge and Ask Again|_LOAD_FILAMENT_OPTION_PURGE_AGAIN|info"
    RESPOND TYPE=command MSG="action:prompt_footer_button Not Loaded - Manual recover|_LOAD_FILAMENT_OPTION_STAY_PAUSED|error"
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro _LOAD_FILAMENT_OPTION_RESUME]
description: Option 1 - filament loaded correctly; resume if currently paused.
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    RESPOND MSG="Filament extrusion confirmed"
    {% if printer.pause_resume.is_paused %}
        RESPOND MSG="Resuming paused print"
        RESUME
    {% else %}
        RESPOND MSG="Printer is not paused; no resume action required"
    {% endif %}

[gcode_macro _LOAD_FILAMENT_OPTION_PURGE_AGAIN]
description: Option 2 - run purge and ask operator again.
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    RESPOND MSG="Running purge before asking for filament confirmation again"
    PURGE
    _LOAD_FILAMENT_CONFIRM_PROMPT

[gcode_macro _LOAD_FILAMENT_OPTION_STAY_PAUSED]
description: Option 3 - keep current paused/manual state and let operator decide when to resume.
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    RESPOND TYPE=error MSG="Filament not loaded. Print remains paused; perform manual actions and press RESUME when ready."

[gcode_macro _LOAD_FILAMENT_CONFIRM_YES]
description: Backward-compatible wrapper for option 1.
gcode:
    _LOAD_FILAMENT_OPTION_RESUME

[gcode_macro _LOAD_FILAMENT_CONFIRM_NO]
description: Backward-compatible wrapper for option 3.
gcode:
    _LOAD_FILAMENT_OPTION_STAY_PAUSED

[gcode_macro UNLOAD_FILAMENT]
description: Unload filament from the active extruder.
gcode:
    {% set speed = params.SPEED|default(10)|float %}
    {% set distance = params.DISTANCE|default(100)|float %}
    {% set min_temp = printer.configfile.settings.extruder.min_extrude_temp|float %}
    SAVE_GCODE_STATE NAME=unload_filament_state
    {% if not printer[printer.toolhead.extruder].can_extrude %}
        RESPOND MSG="Heating extruder to {min_temp}C for filament unload"
        M109 S{min_temp}
    {% endif %}
    M83
    G1 E-{distance} F{speed * 60}
    G92 E0
    RESTORE_GCODE_STATE NAME=unload_filament_state
    RESPOND MSG="Filament unloaded"

[gcode_macro M600]
description: Filament change helper.
gcode:
    PAUSE
    RESPOND MSG="Filament change requested. Run LOAD_FILAMENT and confirm extrusion in the prompt."
