#####################################################################
#  Filament handling
#####################################################################
[gcode_macro LOAD_FILAMENT]
description: Load filament into the active extruder.
gcode:
    {% set speed = params.SPEED|default(10)|float %}
    {% set distance = params.DISTANCE|default(80)|float %}
    {% set min_temp = printer.configfile.settings.extruder.min_extrude_temp|float %}
    SAVE_GCODE_STATE NAME=load_filament_state
    {% if not printer[printer.toolhead.extruder].can_extrude %}
        RESPOND MSG="Heating extruder to {min_temp}C for filament load"
        M109 S{min_temp}
    {% endif %}
    M83
    G1 E{distance} F{speed * 60}
    G92 E0
    RESTORE_GCODE_STATE NAME=load_filament_state
    RESPOND MSG="Filament loaded. Running post-load cleanup and purge workflow"
    _LOAD_FILAMENT_POST_WORKFLOW

[gcode_macro _LOAD_FILAMENT_POST_WORKFLOW]
description: Post-load sequence to park, clean, purge, and confirm extrusion.
gcode:
    PARK_POS
    CLEAN_NOZZLE
    PURGE
    CLEAN_NOZZLE
    _LOAD_FILAMENT_CONFIRM_PROMPT

[gcode_macro _LOAD_FILAMENT_CONFIRM_PROMPT]
description: Ask operator to confirm filament extrusion after load workflow.
gcode:
    RESPOND TYPE=command MSG="action:prompt_begin Filament load confirmation"
    RESPOND TYPE=command MSG="action:prompt_text Did filament extrude correctly?"
    RESPOND TYPE=command MSG="action:prompt_text Press Yes to continue. Press No to run LOAD_FILAMENT again."
    RESPOND TYPE=command MSG="action:prompt_footer_button Yes|_LOAD_FILAMENT_CONFIRM_YES|primary"
    RESPOND TYPE=command MSG="action:prompt_footer_button No|_LOAD_FILAMENT_CONFIRM_NO|error"
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro _LOAD_FILAMENT_CONFIRM_YES]
description: Handle successful extrusion confirmation.
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    RESPOND MSG="Filament extrusion confirmed"
    {% if printer.pause_resume.is_paused %}
        RESPOND MSG="Resuming paused print"
        RESUME
    {% else %}
        RESPOND MSG="Printer is not paused; no resume action required"
    {% endif %}

[gcode_macro _LOAD_FILAMENT_CONFIRM_NO]
description: Handle failed extrusion confirmation.
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    RESPOND TYPE=error MSG="No filament extrusion confirmed. Run LOAD_FILAMENT again."

[gcode_macro UNLOAD_FILAMENT]
description: Unload filament from the active extruder.
gcode:
    {% set speed = params.SPEED|default(10)|float %}
    {% set distance = params.DISTANCE|default(100)|float %}
    {% set min_temp = printer.configfile.settings.extruder.min_extrude_temp|float %}
    SAVE_GCODE_STATE NAME=unload_filament_state
    {% if not printer[printer.toolhead.extruder].can_extrude %}
        RESPOND MSG="Heating extruder to {min_temp}C for filament unload"
        M109 S{min_temp}
    {% endif %}
    M83
    G1 E-{distance} F{speed * 60}
    G92 E0
    RESTORE_GCODE_STATE NAME=unload_filament_state
    RESPOND MSG="Filament unloaded"

[gcode_macro M600]
description: Filament change helper.
gcode:
    PAUSE
    RESPOND MSG="Filament change requested. Run LOAD_FILAMENT and confirm extrusion in the prompt."
