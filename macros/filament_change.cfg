#####################################################################
# 	FILAMENT CUT
#####################################################################
[gcode_macro CUT_FILAMENT]
description: Auto-select HH-style or original filament cut routine.
gcode:
  {% set temperature = params.TEMP|default(170)|float %}
  {% set hh_cut_available = printer['gcode_macro _MMU_CUT_TIP'] is defined %}
  {% if hh_cut_available %}
    RESPOND MSG="CUT_FILAMENT: using CUT_FILAMENT_HH"
    CUT_FILAMENT_HH TEMP={temperature}
  {% else %}
    RESPOND MSG="CUT_FILAMENT: using CUT_FILAMENT_ORIG"
    CUT_FILAMENT_ORIG TEMP={temperature}
  {% endif %}

[gcode_macro CUT_FILAMENT_ORIG]
description: Original cutter routine with incremental X-only cut sweep.
gcode:
  RESPOND MSG="Cutting Filament (ORIG)"
  {% set temperature = params.TEMP|default(170)|float %}
  {% set start_x = 0 %}
  {% set max_travel = 16 %}
  {% set cut_speed = 10 %}
  {% set travel_speed = 100 %}

  SAVE_GCODE_STATE NAME=cut_state
  M104 S{temperature} ;Preheat Extruder
  HOME_CHECK
  HEAT_EXTRUDER TEMP={temperature} ;Wait until Extruder is heated
  G0 X0 Y0 F{travel_speed * 60}

  #CUTTING ACTION
  {% for i in range(max_travel) %}
    G0 X{start_x - (i + 1)} F{cut_speed * 60}
  {% endfor %}
  G0 X0 F{cut_speed * 60}

  #CLEAN
  PARK_POS
  CLEAN_NOZZLE
  PARK_POS

  # Restore original state
  RESTORE_GCODE_STATE NAME=cut_state

[gcode_macro CUT_FILAMENT_HH]
description: HH-style cutter motion with hardcoded local parameters.
gcode:
  RESPOND MSG="Cutting Filament (HH-style local macro)"
  {% set temperature = params.TEMP|default(170)|float %}

  {% set cut_stepper_percent = 150 %}
  {% set park_x = 4.0 %}
  {% set park_y = -2.5 %}
  {% set cut_x = -10.0 %}
  {% set cut_y = -2.5 %}
  {% set travel_speed = 100 %}
  {% set cut_fast_move_speed = 32 %}
  {% set cut_slow_move_speed = 2 %}
  {% set cut_fast_move_fraction = 0.0 %}
  {% set cut_dwell_time = 50 %}
  {% set evacuate_speed = 150 %}
  {% set rip_length = 1.0 %}
  {% set rip_speed = 3 %}

  {% set transition_x = (cut_x - park_x) * cut_fast_move_fraction + park_x %}
  {% set transition_y = (cut_y - park_y) * cut_fast_move_fraction + park_y %}
  {% set has_x_tmc = printer['tmc2209 stepper_x'] is defined %}
  {% set has_y_tmc = printer['tmc2209 stepper_y'] is defined %}

  SAVE_GCODE_STATE NAME=cut_hh_state
  HOME_CHECK
  HEAT_EXTRUDER TEMP={temperature}

  G90
  M83
  G92 E0

  {% if has_x_tmc %}
    {% set x_base_current = printer['tmc2209 stepper_x'].run_current|float %}
    {% set x_boosted_current = x_base_current * cut_stepper_percent / 100.0 %}
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={x_boosted_current}
  {% endif %}
  {% if has_y_tmc %}
    {% set y_base_current = printer['tmc2209 stepper_y'].run_current|float %}
    {% set y_boosted_current = y_base_current * cut_stepper_percent / 100.0 %}
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={y_boosted_current}
  {% endif %}

  G1 X{park_x} Y{park_y} F{travel_speed * 60}
  G1 X{transition_x} Y{transition_y} F{cut_fast_move_speed * 60}
  G1 X{cut_x} Y{cut_y} F{cut_slow_move_speed * 60}
  G4 P{cut_dwell_time}
  {% if rip_length > 0 %}
    G1 E-{rip_length} F{rip_speed * 60}
  {% endif %}
  G1 X{park_x} Y{park_y} F{evacuate_speed * 60}

  {% if has_x_tmc %}
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={x_base_current}
  {% endif %}
  {% if has_y_tmc %}
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={y_base_current}
  {% endif %}

  CLEAN_NOZZLE
  PARK_POS
  RESTORE_GCODE_STATE NAME=cut_hh_state
