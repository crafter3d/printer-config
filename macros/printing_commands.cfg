#####################################################################
#  PRINT START
#####################################################################
[gcode_macro PRINT_START]
variable_last_bed_temp: 0.0
variable_last_extruder_temp: 0.0
gcode:
    CHIME_PRINT_COMPLETE
    RESPOND MSG="Start Printing"
    {% set force_door = printer.save_variables.variables.force_closed_door_before_print|default(1)|int %}
    {% if force_door == 1 %}
        CLOSE_DOOR
        RESPOND MSG="Door close enforced before print"
    {% else %}
        RESPOND MSG="Door close skipped by user preference"
    {% endif %}
    {% set BED_TEMP = params.BED_TEMP|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|float %}
    {% set PROBE_BED_TEMP = 40.0 %}
    {% set PREHEAT_TEMP = printer.configfile.settings.extruder.min_extrude_temp|default(180)|float %}
    SET_GCODE_VARIABLE MACRO=PRINT_START VARIABLE=last_bed_temp VALUE={BED_TEMP}
    SET_GCODE_VARIABLE MACRO=PRINT_START VARIABLE=last_extruder_temp VALUE={EXTRUDER_TEMP}
    {% set hh_start_macros_available = printer['gcode_macro MMU_START_SETUP'] is defined
        and printer['gcode_macro MMU_START_CHECK'] is defined
        and printer['gcode_macro MMU_START_LOAD_INITIAL_TOOL'] is defined %}

    {% if hh_start_macros_available %}
        RESPOND MSG="Happy Hare detected: running MMU start checks"
        MMU_START_SETUP {rawparams}
        MMU_START_CHECK
    {% endif %}

    # Start bed and standby-hotend heating while mechanical prep runs.
    M140 S{PROBE_BED_TEMP}
    M104 S{PREHEAT_TEMP}
    #SHAPER_CALIBRATE
    # Re-home Z after cleanup/twist correction to ensure probing starts from a known plane.
    G28 Z
    CLEAN_NOZZLE
    # Probe and bed compensation runs are standardized at 40C.
    M190 S{PROBE_BED_TEMP}
    RESPOND MSG="Z tilt adjust"
    Z_TILT_ADJUST
    G28 Z
    RESPOND MSG="Bed mesh calibrate"
    BED_MESH_CALIBRATE
    M140 S{BED_TEMP}
    HEAT_EXTRUDER TEMP={EXTRUDER_TEMP}
    # Restore print bed temperature before purge/prime.
    M190 S{BED_TEMP}
    {% if hh_start_macros_available %}
        RESPOND MSG="Happy Hare detected: loading initial tool"
        MMU_START_LOAD_INITIAL_TOOL
    {% endif %}
    PURGE TEMP={EXTRUDER_TEMP}
    PRIME_LINE
    RESPOND MSG="Printing"
    M117 Printing

#####################################################################
#  PRINT END
#####################################################################
[gcode_macro PRINT_END]
description: End of print.
gcode:
    CHIME_PRINT_COMPLETE
    {% set min_extrude_temp = printer.configfile.settings.extruder.min_extrude_temp|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(min_extrude_temp)|float %}
    {% set eject = params.EJECT|default(1)|int %}
    {% set th = printer.toolhead %}
    {% set x_safe = th.position.x + 20 * (1 if th.axis_maximum.x - th.position.x > 20 else -1) %}
    {% set y_safe = th.position.y + 20 * (1 if th.axis_maximum.y - th.position.y > 20 else -1) %}
    {% set z_safe = [th.position.z + 2, th.axis_maximum.z]|min %}
    {% set hh_end_macro_available = printer['gcode_macro MMU_END'] is defined %}

    {% if hh_end_macro_available %}
        RESPOND MSG="Happy Hare detected: running MMU end lifecycle"
        MMU_END {rawparams}
    {% endif %}

    # Flush planner and reset E origin before end-of-print retract sequence.
    M400                           ; wait for buffer to clear
    G92 E0                        ; zero the extruder
    G1 E-2.0 F3600                 ; retract filament

    TURN_OFF_HEATERS

    G90                                      ; absolute positioning
    G0 X{x_safe} Y{y_safe} Z{z_safe} F20000  ; move nozzle to remove stringing
    G0 X{th.axis_maximum.x//2} Y{th.axis_maximum.y - 2} F3600  ; park nozzle at rear

    M106 P2 S255
    # Lift in relative mode to avoid nozzle collision during cleanup/ejection.
    G91
    G1 Z10 F600
    G90
    CLEAN_NOZZLE
    THROW_PURGE
    PARK_POS
    G91
    G1 E-5 F300
    G90
    OPEN_DOOR
    Z_DROP
    CLEAN_NOZZLE
    PARK_POS
    #CUT_FILAMENT TEMP={EXTRUDER_TEMP}
    G4 P2000
    {% if eject == 1 %}
            COOLDOWN TARGET=40 WAIT=1 KEEP_FANS=1
            BELT_THROW
      CLOSE_DOOR
    {% endif %}
    COOLDOWN_STOP
    CLEAN_NOZZLE
    PARK_POS
    RESPOND MSG="Print Completed"
    M117 Print completed

#####################################################################
#  RETRY PRINT START
#####################################################################
[gcode_macro RETRY_PRINT_START]
description: Move belt, settle surface, and rerun PRINT_START.
gcode:
        {% set RETRY_DIST = params.RETRY_DIST|default(120)|float %}
        {% set RETRY_SPEED = params.RETRY_SPEED|default(30)|float %}
        {% set BED_TEMP = params.BED_TEMP|default(printer["gcode_macro PRINT_START"].last_bed_temp)|float %}
        {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(printer["gcode_macro PRINT_START"].last_extruder_temp)|float %}

        {% if BED_TEMP <= 0 or EXTRUDER_TEMP <= 0 %}
            RESPOND TYPE=error MSG="RETRY_PRINT_START requires BED_TEMP and EXTRUDER_TEMP (or run PRINT_START once first)."
        {% else %}
            RESPOND MSG="Retrying print start after belt nudge"
            BELT_MOVE DIST={RETRY_DIST} SPEED={RETRY_SPEED}
            BELT_SETTLE
            PRINT_START BED_TEMP={BED_TEMP} EXTRUDER_TEMP={EXTRUDER_TEMP}
        {% endif %}

#####################################################################
#  BELT SETTLE
#####################################################################
[gcode_macro BELT_SETTLE]
description: Nudge belt forward/backward to settle probe surface.
gcode:
    {% set distance = params.DIST|default(60)|float %}
    {% set speed = params.SPEED|default(20)|float %}
    RESPOND MSG="Belt settle +/-{distance}mm at {speed}mm/s"
    MANUAL_STEPPER STEPPER=belt ENABLE=1
    MANUAL_STEPPER STEPPER=belt SET_POSITION=0
    MANUAL_STEPPER STEPPER=belt MOVE={distance} SPEED={speed}
    MANUAL_STEPPER STEPPER=belt MOVE=0 SPEED={speed}
    MANUAL_STEPPER STEPPER=belt SET_POSITION=0

#####################################################################
#  PRIME LINE
#####################################################################
[gcode_macro PRIME_LINE]
description: First line to be printed before object.
gcode:
    # Set vars
    {% set max_velocity = printer.configfile.settings.printer.max_velocity|float %}
    # St is travel speed to prime start, not the extrusion-line speed.
    {% set prime_travel_speed = params.TRAVEL_SPEED|default([350.0, max_velocity]|min)|float %}
    {% set St = (prime_travel_speed * 60)|int %}
    {% set Sz = 15 * 60 %}
    {% set prime_line_x, prime_line_y = 2,20 %}

    # Use relative extrusion and a Z hop before moving to prime-line start.
    G91
    M83
    G1 Z5 F{Sz}
    # Starting position
    G90
    G1 X{prime_line_x} Y{prime_line_y} F{St}
    G1 Z0.2 F{Sz|int / 2}
    # Add pressure in the nozzle
    G92 E0
    G1 E10 F300
    # Prime line
    G92 E0
    G1 Y{prime_line_y + 80} E10 F2500
    G92 E0
    G1 Y{prime_line_y + 130} E5 F1500
    # Retract and Z-hop
    G92 E0
    G1 Z4.0 E-0.4 F{Sz}
    G92 E0
    G1 Z5 F{Sz}

#####################################################################
#  HEAT
#####################################################################
[gcode_macro HEAT_EXTRUDER]
description: Heat extruder action to given temperature.
gcode:
    {% set temperature = params.TEMP|float %}
    PARK_POS
    # Block until the nozzle reaches target temperature.
    M109 S{temperature} ;Wait until Extruder is heated

[gcode_macro _CANCEL_USER_HOOK]
description: User extension hook for cancel behavior.
gcode:
    # Intentionally empty. Add custom cancel actions here if needed.

[gcode_macro _PAUSE_POWER_SAVE]
description: Store bed target and switch all heaters off during pause.
variable_saved_bed_target: 0.0
variable_runout_pause: 0
gcode:
    {% set from_runout = printer["gcode_macro _PAUSE_POWER_SAVE"].runout_pause|default(0)|int == 1 %}
    {% set bed_target = printer.heater_bed.target|float %}
    SET_GCODE_VARIABLE MACRO=_PAUSE_POWER_SAVE VARIABLE=saved_bed_target VALUE={bed_target}
    # Force mainsail RESUME to take the idle branch so extruder target is restored automatically.
    SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=idle_state VALUE=True
    TURN_OFF_HEATERS
    RESPOND MSG="Pause power-save active: heaters off, steppers held"
    {% if from_runout %}
        SET_GCODE_VARIABLE MACRO=_PAUSE_POWER_SAVE VARIABLE=runout_pause VALUE=0
        RESPOND MSG="Filament runout pause detected. Starting filament load workflow"
        LOAD_FILAMENT
    {% endif %}

[gcode_macro _PAUSE_FOR_FILAMENT_RUNOUT]
description: Mark runout-triggered pause and execute standard pause flow.
gcode:
    SET_GCODE_VARIABLE MACRO=_PAUSE_POWER_SAVE VARIABLE=runout_pause VALUE=1
    PAUSE

[gcode_macro _RESUME_RESTORE_BED]
description: Restore saved bed target before resume move.
gcode:
    {% set bed_target = printer["gcode_macro _PAUSE_POWER_SAVE"].saved_bed_target|float %}
    {% if bed_target > 0 %}
        RESPOND MSG="Restoring bed to {bed_target}C before resume"
        M190 S{bed_target}
    {% endif %}
