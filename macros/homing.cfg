#####################################################################
#  HOMING
#####################################################################
[homing_override]
set_position_z: 0       # Temporarily "home" Z so we can move it
axes: z               # Override for G28 Z axes
gcode:
  # Use relative move for a safe initial Z lift, then return to absolute mode.
  HOME_XY
  _HOME_Z_UNSAFE


[gcode_macro HOME_CHECK]
description: Check if axes are homed, and run G28 if not.
gcode:
  {% set homed = printer.toolhead.homed_axes %}
  {% if 'x' not in homed or 'y' not in homed or 'z' not in homed %}
    # Recover a known coordinate system before macros that assume homed axes.
    G28
  {% endif %}

[gcode_macro HOME_CHECK_XY]
description: Check if axes are homed, and run G28 if not.
gcode:
  {% set homed = printer.toolhead.homed_axes %}
  {% if 'x' not in homed or 'y' not in homed %}
    # Recover a known coordinate system before macros that assume homed axes.
    HOME_XY
  {% endif %}

[gcode_macro HOME_X]
description: Home X axis only.
gcode:
  G91
  G0 Z5 F600
  G90
  G28 Y0 X0
  RESPOND MSG="X homed"

[gcode_macro HOME_Y]
description: Home Y axis only.
gcode:
  G91
  G0 Z5 F600
  G90
  G28 Y0
  RESPOND MSG="Y homed"

[gcode_macro HOME_XY]
description: Home X and Y axes.
gcode:
  G91
  G0 Z5 F600
  G90
  G28 Y0 X0
  RESPOND MSG="X and Y homed"

[gcode_macro HOME_Z_SAFE]
description: Home Z at probe-safe center after ensuring XY are homed.
gcode:
  {% set homed = printer.toolhead.homed_axes %}
  {% if 'x' not in homed or 'y' not in homed %}
    G28 X0 Y0
  {% endif %}
  G91
  G0 Z5 F600
  _HOME_Z_UNSAFE
  RESPOND MSG="Z homed"


[gcode_macro _HOME_Z_UNSAFE]
description: Home Z movements reused by HOMING macros
gcode:
  {% set x_max = printer.toolhead.axis_maximum.x|float %}
  {% set x_center = (printer.toolhead.axis_minimum.x|float + printer.toolhead.axis_maximum.x|float) / 2.0 %}
  {% set y_center = (printer.toolhead.axis_minimum.y|float + printer.toolhead.axis_maximum.y|float) / 2.0 %}
  G90
  # Move to nozzle area and clean
  G1 X{x_max - 8.5} F1200
  CLEAN_NOZZLE
  # Move probe to center
  G0 X{x_center} Y{y_center} F6000
  G28 Z
  G0 Z30 F600


[gcode_macro HOME_Z]
description: Alias for HOME_Z_SAFE.
gcode:
  HOME_Z_SAFE

[gcode_macro HOME_ALL]
description: Home all axes.
gcode:
  G28
  RESPOND MSG="All axes homed"
