#####################################################################
#  HOMING
#####################################################################
[homing_override]
set_position_z: 0       # Temporarily "home" Z so we can move it
axes: z               # Override for G28 Z axes
gcode:
  G91
  G0 Z5 F600
  G90
  # Home Y
  G28 Y0
  # Home X
  G28 X0
  G1 X250 F1200
  CLEAN_NOZZLE
  # Home Z
  G0 X125 Y127 F6000
  G28 Z
  # Z hop
  G0 Z30 F600
  G90


[gcode_macro HOME_CHECK]
description: Check if axes are homed, and run G28 if not.
gcode:
  {% set homed = printer.toolhead.homed_axes %}
  {% if 'x' not in homed or 'y' not in homed or 'z' not in homed %}
    G28
  {% endif %}
