#####################################################################
#  Temperature presets
#####################################################################
[gcode_macro PREHEAT_PLA]
description: Preheat for PLA.
gcode:
    {% set nozzle = params.NOZZLE|default(200)|int %}
    {% set bed = params.BED|default(60)|int %}
    RESPOND MSG="Preheat PLA: nozzle {nozzle}C, bed {bed}C"
    M104 S{nozzle}
    M140 S{bed}

[gcode_macro PREHEAT_PETG]
description: Preheat for PETG.
gcode:
    {% set nozzle = params.NOZZLE|default(235)|int %}
    {% set bed = params.BED|default(80)|int %}
    RESPOND MSG="Preheat PETG: nozzle {nozzle}C, bed {bed}C"
    M104 S{nozzle}
    M140 S{bed}

[gcode_macro PREHEAT_ABS]
description: Preheat for ABS.
gcode:
    {% set nozzle = params.NOZZLE|default(240)|int %}
    {% set bed = params.BED|default(100)|int %}
    RESPOND MSG="Preheat ABS: nozzle {nozzle}C, bed {bed}C"
    M104 S{nozzle}
    M140 S{bed}

[gcode_macro COOLDOWN]
description: Turn off heaters and run all cooldown fans.
variable_default_chamber_target: 50.0
gcode:
    {% set target = params.TARGET|default(40)|float %}
    {% set wait = params.WAIT|default(0)|int %}
    {% set keep_fans = params.KEEP_FANS|default(1)|int %}
    {% set chamber_target = params.CHAMBER_TARGET|default(printer["gcode_macro COOLDOWN"].default_chamber_target)|float %}
    TURN_OFF_HEATERS
    SET_FAN_SPEED FAN=bed_cooling_fans SPEED=1.0
    SET_FAN_SPEED FAN=aux_blower SPEED=1.0
    SET_TEMPERATURE_FAN_TARGET TEMPERATURE_FAN=Chamber TARGET=0 MIN_SPEED=1.0 MAX_SPEED=1.0
    RESPOND MSG="Cooldown active: bed, aux, and chamber fans ON"
    {% if wait == 1 %}
        TEMPERATURE_WAIT SENSOR=heater_bed MAXIMUM={target}
        RESPOND MSG="Bed reached cooldown target ({target}C)"
    {% endif %}
    {% if keep_fans == 0 %}
        COOLDOWN_STOP CHAMBER_TARGET={chamber_target}
    {% endif %}

[gcode_macro COOLDOWN_STOP]
description: Stop cooldown fans and restore chamber automatic control.
gcode:
    {% set chamber_target = params.CHAMBER_TARGET|default(50)|float %}
    SET_FAN_SPEED FAN=bed_cooling_fans SPEED=0
    SET_FAN_SPEED FAN=aux_blower SPEED=0
    SET_TEMPERATURE_FAN_TARGET TEMPERATURE_FAN=Chamber TARGET={chamber_target} MIN_SPEED=0.3 MAX_SPEED=1.0
    RESPOND MSG="Cooldown fans stopped; chamber control restored"

# Belt thermal guard contract:
# - Use BED_TARGET=39 only when previous bed target was >39C.
# - Omit BED_TARGET when target is <=39C/off to avoid unintended reheating.
# - Use KEEP_FANS=1 during guard begin and COOLDOWN_BED_STOP before restore.
[gcode_macro COOLDOWN_BED]
description: Bed-only cooldown assist without changing other heater targets.
gcode:
    {% set target = params.TARGET|default(39)|float %}
    {% set wait = params.WAIT|default(0)|int %}
    {% set keep_fans = params.KEEP_FANS|default(1)|int %}
    {% set bed_target = params.BED_TARGET|default(-1)|float %}
    {% if bed_target >= 0 %}
        M140 S{bed_target}
        RESPOND MSG="Bed cooldown assist: bed target set to {bed_target}C"
    {% endif %}
    SET_FAN_SPEED FAN=bed_cooling_fans SPEED=1.0
    SET_FAN_SPEED FAN=aux_blower SPEED=1.0
    RESPOND MSG="Bed cooldown assist active: bed and aux fans ON"
    {% if wait == 1 %}
        TEMPERATURE_WAIT SENSOR=heater_bed MAXIMUM={target}
        RESPOND MSG="Bed reached cooldown assist target ({target}C)"
    {% endif %}
    {% if keep_fans == 0 %}
        COOLDOWN_BED_STOP
    {% endif %}

[gcode_macro COOLDOWN_BED_STOP]
description: Stop bed-only cooldown assist fans.
gcode:
    SET_FAN_SPEED FAN=bed_cooling_fans SPEED=0
    SET_FAN_SPEED FAN=aux_blower SPEED=0
    RESPOND MSG="Bed cooldown assist fans stopped"

[gcode_macro TEST_CHAMBER_FAN]
description: Force chamber fan using a fake target; STOP=1 restores automatic control.
variable_active: 0
gcode:
    {% set stop = params.STOP|default(0)|int %}
    {% set fake_target = params.TARGET|default(0)|float %}
    {% set chamber_target = params.CHAMBER_TARGET|default(printer["gcode_macro COOLDOWN"].default_chamber_target)|float %}
    {% if stop == 1 %}
        SET_GCODE_VARIABLE MACRO=TEST_CHAMBER_FAN VARIABLE=active VALUE=0
        SET_TEMPERATURE_FAN_TARGET TEMPERATURE_FAN=Chamber TARGET={chamber_target} MIN_SPEED=0.3 MAX_SPEED=1.0
        RESPOND MSG="Chamber fan test stopped; target restored to {chamber_target}C"
    {% else %}
        SET_GCODE_VARIABLE MACRO=TEST_CHAMBER_FAN VARIABLE=active VALUE=1
        SET_TEMPERATURE_FAN_TARGET TEMPERATURE_FAN=Chamber TARGET={fake_target} MIN_SPEED=1.0 MAX_SPEED=1.0
        RESPOND MSG="Chamber fan test active with fake target {fake_target}C"
        RESPOND MSG="Run TEST_CHAMBER_FAN STOP=1 to restore automatic control"
    {% endif %}
