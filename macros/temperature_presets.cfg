#####################################################################
#  Temperature presets
#####################################################################
[gcode_macro PREHEAT_PLA]
description: Preheat for PLA.
gcode:
    {% set nozzle = params.NOZZLE|default(200)|int %}
    {% set bed = params.BED|default(60)|int %}
    RESPOND MSG="Preheat PLA: nozzle {nozzle}C, bed {bed}C"
    M104 S{nozzle}
    M140 S{bed}

[gcode_macro PREHEAT_PETG]
description: Preheat for PETG.
gcode:
    {% set nozzle = params.NOZZLE|default(235)|int %}
    {% set bed = params.BED|default(80)|int %}
    RESPOND MSG="Preheat PETG: nozzle {nozzle}C, bed {bed}C"
    M104 S{nozzle}
    M140 S{bed}

[gcode_macro PREHEAT_ABS]
description: Preheat for ABS.
gcode:
    {% set nozzle = params.NOZZLE|default(240)|int %}
    {% set bed = params.BED|default(100)|int %}
    RESPOND MSG="Preheat ABS: nozzle {nozzle}C, bed {bed}C"
    M104 S{nozzle}
    M140 S{bed}

[gcode_macro COOLDOWN]
description: Turn off heaters and run all cooldown fans.
variable_default_chamber_target: 50.0
gcode:
    {% set target = params.TARGET|default(40)|float %}
    {% set wait = params.WAIT|default(0)|int %}
    {% set keep_fans = params.KEEP_FANS|default(1)|int %}
    {% set chamber_target = params.CHAMBER_TARGET|default(printer["gcode_macro COOLDOWN"].default_chamber_target)|float %}
    TURN_OFF_HEATERS
    SET_FAN_SPEED FAN=bed_cooling_fans SPEED=1.0
    SET_FAN_SPEED FAN=aux_blower SPEED=1.0
    SET_TEMPERATURE_FAN_TARGET TEMPERATURE_FAN=Chamber TARGET=0 MIN_SPEED=1.0 MAX_SPEED=1.0
    RESPOND MSG="Cooldown active: bed, aux, and chamber fans ON"
    {% if wait == 1 %}
        TEMPERATURE_WAIT SENSOR=heater_bed MAXIMUM={target}
        RESPOND MSG="Bed reached cooldown target ({target}C)"
    {% endif %}
    {% if keep_fans == 0 %}
        COOLDOWN_STOP CHAMBER_TARGET={chamber_target}
    {% endif %}

[gcode_macro COOLDOWN_STOP]
description: Stop cooldown fans and restore chamber automatic control.
gcode:
    {% set chamber_target = params.CHAMBER_TARGET|default(50)|float %}
    SET_FAN_SPEED FAN=bed_cooling_fans SPEED=0
    SET_FAN_SPEED FAN=aux_blower SPEED=0
    SET_TEMPERATURE_FAN_TARGET TEMPERATURE_FAN=Chamber TARGET={chamber_target} MIN_SPEED=0.3 MAX_SPEED=1.0
    RESPOND MSG="Cooldown fans stopped; chamber control restored"
