#####################################################################
#  Local client macro variables (preserved across updates)
#####################################################################
[gcode_macro _CLIENT_VARIABLE]
variable_use_custom_pos: True
variable_custom_park_x: 257.5
variable_custom_park_y: 60.5
variable_custom_park_dz: 0.0
variable_retract: 1.0
variable_cancel_retract: 5.0
variable_speed_retract: 35.0
variable_unretract: 1.0
variable_speed_unretract: 35.0
variable_speed_hop: 15.0
variable_speed_move: 100.0
variable_park_at_cancel: True
variable_park_at_cancel_x: None
variable_park_at_cancel_y: None
variable_use_fw_retract: False
variable_idle_timeout: 86400
variable_runout_sensor: ""
# Keep custom pause/resume/cancel ownership here (mainsail _CLIENT_VARIABLE hooks).
# When Happy Hare optional client_macros.cfg is enabled, leave
# _MMU_CLIENT_VARS user_*_extension values empty to avoid double execution.
# If changing these hooks, review both mainsail and HH hook variables together.
variable_user_pause_macro: "_PAUSE_POWER_SAVE"
variable_user_resume_macro: "_RESUME_RESTORE_BED"
variable_user_cancel_macro: "_CANCEL_USER_HOOK"
gcode:
