#####################################################################
#  Local MCU parameters (preserved across updates)
#####################################################################
# Default topology:
# - Octopus on direct USB
# - U2C v2.1 as the host CAN interface
# - EBB42 on CAN
#
# U2C is not declared as an [mcu]. It only provides the host-side CAN interface.
# UUIDs are unique per physical printer and must be assigned during provisioning.
# Primary flow: Mainsail -> Machine -> Devices -> CAN -> identify and copy UUIDs.
# Secondary flow: run canbus_query.py over SSH.

#[mcu]
#serial: /dev/serial/by-id/usb-Klipper_stm32f446xx_<unique-id>

#[mcu toolhead]
#canbus_uuid:
#canbus_interface: can0

## Alternative when Octopus itself is flashed as the USB-to-CAN bridge:
## [mcu]
## canbus_uuid:
##
## [mcu toolhead]
## canbus_uuid:
